launch:

  # Bag path argument (give absolute path or folder name directly)
  - arg:
      name: bag_name
      default: /home/soumith/vnav/TEAM_7/lab3/bags/30fps_424x240_2018-10-01-18-35-06

  - arg:
      name: descriptor
      default: SIFT
  - arg:
      name: save_images
      default: "false"
  - arg:
      name: show_images
      default: "true"

  - node:
      pkg: lab_3
      exec: track_features
      name: track_features
      param:
        - name: mode
          value: 1
        - name: descriptor
          value: $(var descriptor)
        - name: save_images
          value: $(var save_images)
        - name: show_images
          value: $(var show_images)
        - name: img1_path
          value: ""
        - name: img2_path
          value: ""

      remap:
        - from: "/images_topic"
          to: "/camera/color/image_raw"

  # Play the bag directly using the absolute bag_name path
  - executable:
      cmd: 'ros2 bag play $(var bag_name) --clock --remap /tesse/left_cam/rgb/image_raw:=/camera/color/image_raw'
